<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E8FFF"/>
      <stop offset="100%" style="stop-color:#00C8FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0C1B3A"/>

  <!-- Sun (bottom) -->
  <!-- Rays -->
  <line x1="16" y1="20" x2="7" y2="20" stroke="#1E8FFF" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="20" x2="25" y2="20" stroke="#1E8FFF" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="20" x2="10" y2="14" stroke="#1E8FFF" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="20" x2="22" y2="14" stroke="#1E8FFF" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="20" x2="10" y2="26" stroke="#1E8FFF" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="20" x2="22" y2="26" stroke="#1E8FFF" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="20" x2="16" y2="28" stroke="#1E8FFF" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Sun circle -->
  <circle cx="16" cy="20" r="4" fill="url(#sunGrad)"/>

  <!-- K (top) -->
  <rect x="8" y="4" width="2.5" height="12" rx="1.25" fill="white"/>
  <line x1="10.5" y1="4.5" x2="20" y2="9" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="10.5" y1="15.5" x2="20" y2="11" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Divider -->
  <rect x="6" y="17.5" width="20" height="1" rx="0.5" fill="white" opacity="0.2"/>
</svg>
