<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1B3A"/>
      <stop offset="100%" style="stop-color:#0F2350"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E8FFF"/>
      <stop offset="100%" style="stop-color:#00C8FF"/>
    </linearGradient>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d0eaff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="148"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Sun rays radiating outward from circle edge -->
  <g filter="url(#glow)" opacity="0.85">
    <!-- 8 rays at 45° intervals, starting from circle edge (r=148) outward -->
    <!-- Top -->
    <line x1="256" y1="100" x2="256" y2="56" stroke="url(#sunGrad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Top-right -->
    <line x1="360" y1="152" x2="394" y2="118" stroke="url(#sunGrad)" stroke-width="7" stroke-linecap="round"/>
    <!-- Right -->
    <line x1="404" y1="256" x2="450" y2="256" stroke="url(#sunGrad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Bottom-right -->
    <line x1="360" y1="360" x2="394" y2="394" stroke="url(#sunGrad)" stroke-width="7" stroke-linecap="round"/>
    <!-- Bottom -->
    <line x1="256" y1="404" x2="256" y2="450" stroke="url(#sunGrad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Bottom-left -->
    <line x1="152" y1="360" x2="118" y2="394" stroke="url(#sunGrad)" stroke-width="7" stroke-linecap="round"/>
    <!-- Left -->
    <line x1="108" y1="256" x2="62" y2="256" stroke="url(#sunGrad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Top-left -->
    <line x1="152" y1="152" x2="118" y2="118" stroke="url(#sunGrad)" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Subtle glow behind circle -->
  <circle cx="256" cy="256" r="160" fill="#1E8FFF" opacity="0.08" filter="url(#softglow)"/>

  <!-- Sun circle ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#sunGrad)" stroke-width="10" filter="url(#glow)"/>

  <!-- Inner circle fill (dark) -->
  <circle cx="256" cy="256" r="143" fill="#0C1B3A"/>

  <!-- K letterform inside circle -->
  <!-- Vertical spine of K -->
  <rect x="175" y="155" width="28" height="202" rx="14" fill="url(#kGrad)"/>

  <!-- Upper arm of K — diagonal going top-right -->
  <!-- From mid-spine outward and up -->
  <path d="M 203 256 L 315 160" stroke="url(#kGrad)" stroke-width="28" stroke-linecap="round" fill="none"/>

  <!-- Lower arm of K — diagonal going bottom-right -->
  <path d="M 203 256 L 315 352" stroke="url(#kGrad)" stroke-width="28" stroke-linecap="round" fill="none"/>

  <!-- Glowing dot at the K joint (meeting point) -->
  <circle cx="203" cy="256" r="10" fill="#1E8FFF" filter="url(#glow)" opacity="0.9"/>

  <!-- Glowing dots at the tips of K arms -->
  <circle cx="315" cy="160" r="8" fill="url(#sunGrad)" filter="url(#glow)"/>
  <circle cx="315" cy="352" r="8" fill="url(#sunGrad)" filter="url(#glow)"/>
</svg>
