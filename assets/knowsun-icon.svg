<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E8FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C8FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1B3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2350;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Sun rays (bottom half — the "sun" part of 智) -->
  <!-- Center of sun is at (256, 320) -->
  <!-- Ray lines radiating outward -->
  <g filter="url(#glow)" opacity="0.7">
    <!-- Horizontal rays -->
    <line x1="256" y1="320" x2="130" y2="320" stroke="url(#sunGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="256" y1="320" x2="382" y2="320" stroke="url(#sunGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Diagonal rays -->
    <line x1="256" y1="320" x2="167" y2="231" stroke="url(#sunGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="256" y1="320" x2="345" y2="231" stroke="url(#sunGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="256" y1="320" x2="167" y2="409" stroke="url(#sunGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="256" y1="320" x2="345" y2="409" stroke="url(#sunGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Vertical rays -->
    <line x1="256" y1="320" x2="256" y2="420" stroke="url(#sunGrad)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Sun circle (core) -->
  <circle cx="256" cy="320" r="46" fill="url(#sunGrad)" filter="url(#glow)"/>
  <circle cx="256" cy="320" r="30" fill="#0C1B3A" opacity="0.3"/>

  <!-- Knowledge / upper part of 智 — stylized as a neural/circuit "K" shape -->
  <!-- Vertical spine -->
  <rect x="176" y="120" width="18" height="140" rx="9" fill="white"/>
  <!-- Upper diagonal of K -->
  <rect x="192" y="120" width="120" height="16" rx="8" fill="white" transform="rotate(30, 192, 128)"/>
  <!-- Lower diagonal of K -->
  <rect x="192" y="243" width="118" height="16" rx="8" fill="white" transform="rotate(-28, 192, 251)"/>
  <!-- Horizontal bar connecting (middle of K) -->
  <rect x="194" y="182" width="60" height="14" rx="7" fill="white"/>

  <!-- Small glowing dots on the K tips — "neural nodes" -->
  <circle cx="300" cy="122" r="9" fill="url(#sunGrad)" filter="url(#glow)"/>
  <circle cx="302" cy="254" r="9" fill="url(#sunGrad)" filter="url(#glow)"/>
  <circle cx="249" cy="189" r="6" fill="url(#sunGrad)" filter="url(#glow)" opacity="0.8"/>

  <!-- Dividing line between "know" and "sun" parts — like the 智 horizontal stroke -->
  <rect x="140" y="278" width="232" height="7" rx="3.5" fill="white" opacity="0.25"/>
</svg>
