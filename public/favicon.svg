      <stop offset="0%" style="stop-color:#1E8FFF"/>
      <stop offset="100%" style="stop-color:#00C8FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0C1B3A"/>

  <!-- Sun rays -->
  <line x1="16" y1="3.5" x2="16" y2="1" stroke="#1E8FFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="22.8" y1="9.2" x2="24.7" y2="7.3" stroke="#1E8FFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="25.5" y1="16" x2="28" y2="16" stroke="#1E8FFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="22.8" y1="22.8" x2="24.7" y2="24.7" stroke="#1E8FFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="25.5" x2="16" y2="28" stroke="#1E8FFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="9.2" y1="22.8" x2="7.3" y2="24.7" stroke="#1E8FFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="6.5" y1="16" x2="4" y2="16" stroke="#1E8FFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="9.2" y1="9.2" x2="7.3" y2="7.3" stroke="#1E8FFF" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Circle ring -->
