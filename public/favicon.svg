  <!-- K inside -->
  <line x1="11" y1="10" x2="11" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="11" y1="16" x2="20" y2="10.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="11" y1="16" x2="20" y2="21.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
